<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Portfolio | Powered by Kraftin</title>
    <script src="https://cdn.tailwindcss.com"></script> 
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body class="bg-gray-900 text-white font-sans">

    <nav class="flex justify-between items-center p-6 bg-black/50 backdrop-blur-md sticky top-0 z-50">
        <div class="text-2xl font-bold tracking-tighter text-blue-500">KRAFTIN.</div>
        <ul class="flex space-x-6 text-sm uppercase tracking-widest">
            <li><a href="#home" class="hover:text-blue-400">Home</a></li>
            <li><a href="#work" class="hover:text-blue-400">Work</a></li>
            <li><a href="#contact" class="hover:text-blue-400">Contact</a></li>
        </ul>
    </nav>

    <section id="home" class="h-screen flex flex-col justify-center items-center text-center px-4">
        <h2 id="client-name" class="text-blue-500 text-lg mb-2 font-medium">Loading Name...</h2>
        <h1 class="text-5xl md:text-7xl font-extrabold mb-6">Building Digital <br> <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-600">Experiences.</span></h1>
        <a href="#work" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-full transition-all">View My Work</a>
    </section>

    <footer id="contact" class="py-10 text-center border-t border-gray-800">
        <p class="text-gray-500 mb-2 italic">Ready to start a project?</p>
        <a id="client-email" href="mailto:client@email.com" class="text-2xl font-bold hover:text-blue-500">client@email.com</a>
        <div class="mt-8 text-xs text-gray-600 uppercase tracking-widest">
            Developed with ❤️ by **Kraftin Brand**
        </div>
    </footer>

    <script>
        // एडमिन पैनल से डेटा खींचने वाली स्क्रिप्ट
        fetch('/content/index.json')
            .then(res => res.json())
            .then(data => {
                if(data.name) document.getElementById('client-name').innerText = "Hello, I am " + data.name;
                if(data.bio) document.getElementById('client-email').innerText = data.bio; // bio को ईमेल की जगह दिखा रहे हैं टेस्ट के लिए
            })
            .catch(err => console.log("Admin panel data not found yet."));

        // लॉगिन रीडायरेक्ट
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) {
                    window.netlifyIdentity.on("login", () => {
                        document.location.href = "/admin/";
                    });
                }
            });
        }
    </script>
</body>
</html>
